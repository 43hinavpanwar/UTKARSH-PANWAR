<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="{{ url_for('static', filename='IMAGE/logo.jpg') }}" />
  <title>UTK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & GLOBAL ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
      font-family: 'Inter', sans-serif;
      color: #e0e0e0;
      padding: 1.5rem;
      position: relative;
    }

    /* subtle animated background accent */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 40%, rgba(232, 98, 42, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LOGIN CARD ===== */
    .login-card {
      background: rgba(18, 18, 24, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(232, 98, 42, 0.25);
      border-radius: 28px;
      padding: 2.2rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: transform 0.2s ease, border-color 0.2s;
      z-index: 1;
    }

    .login-card:hover {
      border-color: rgba(232, 98, 42, 0.5);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
    }

    /* Header & logo area (matches admin header style) */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #e8622a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.35rem;
    }

    .login-header .sub {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #e8622a;
      font-weight: 500;
      border-top: 1px solid rgba(232, 98, 42, 0.3);
      display: inline-block;
      padding-top: 0.5rem;
    }

    /* Form field styling - matches dashboard input style */
    .field-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #aaa;
      margin-bottom: 0.55rem;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #e8622a;
      font-size: 0.9rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      background: rgba(8, 8, 12, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #f0f0f0;
      font-size: 0.9rem;
      font-family: 'Inter', monospace;
      transition: all 0.25s ease;
      outline: none;
    }

    input:focus {
      border-color: #e8622a;
      box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.2);
      background: #0c0c10;
    }

    input::placeholder {
      color: #4a4a55;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
    }

    /* Button style (identical to dashboard primary) */
    .login-btn {
      width: 100%;
      padding: 0.9rem 1rem;
      background: linear-gradient(105deg, #e8622a, #c04f1e);
      border: none;
      border-radius: 40px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(232, 98, 42, 0.2);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(232, 98, 42, 0.35);
      background: linear-gradient(105deg, #f06e34, #d45620);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    /* Error message (matches msg.error from dashboard) */
    .error-message {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 14px;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      backdrop-filter: blur(4px);
    }

    .error-message i {
      font-size: 0.9rem;
      color: #f87171;
    }

    /* Optional footer note */
    .secure-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.5px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1.2rem;
    }

    .secure-note i {
      color: #e8622a;
      font-size: 0.65rem;
    }

    /* ===== FULL RESPONSIVE ===== */
    @media (max-width: 500px) {
      body {
        padding: 1rem;
      }
      .login-card {
        padding: 1.8rem 1.5rem;
        max-width: 94%;
        border-radius: 24px;
      }
      .login-header h1 {
        font-size: 1.6rem;
      }
      .login-header .sub {
        font-size: 0.65rem;
        letter-spacing: 2px;
      }
      input {
        padding: 0.75rem 1rem 0.75rem 2.4rem;
        font-size: 0.85rem;
      }
      .input-wrapper i {
        font-size: 0.8rem;
        left: 0.85rem;
      }
      .login-btn {
        padding: 0.75rem;
        font-size: 0.85rem;
      }
      .field-group {
        margin-bottom: 1.2rem;
      }
    }

    @media (max-width: 380px) {
      .login-card {
        padding: 1.4rem 1.2rem;
      }
      .login-header h1 {
        font-size: 1.4rem;
      }
      .secure-note {
        font-size: 0.6rem;
      }
      .error-message {
        font-size: 0.7rem;
        padding: 0.6rem 0.9rem;
      }
    }

    /* slight focus animation */
    @keyframes gentlePulse {
      0% { box-shadow: 0 0 0 0 rgba(232, 98, 42, 0.2); }
      100% { box-shadow: 0 0 0 4px rgba(232, 98, 42, 0); }
    }
    input:focus {
      animation: gentlePulse 0.5s ease-out;
    }
  </style>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1>UTK</h1>
    </div>

    <!-- Error message block (matches dashboard styling) -->
    {% if error %}
    <div class="error-message">
      <i class="fas fa-shield-haltered"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Secure login form -->
    <form method="POST" action="">
      <div class="field-group">
        <label><i class="fas fa-user-astronaut" style="margin-right: 5px;"></i> Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="admin / editor" autocomplete="username" required />
        </div>
      </div>

      <div class="field-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="input-wrapper">
          <i class="fas fa-key"></i>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-arrow-right-to-bracket"></i> Access Panel
      </button>
      
      <div class="secure-note">
        <i class="fas fa-database"></i>  Authorized access only
      </div>
    </form>
  </div>
</body>
</html>
